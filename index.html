<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>July · Gothic Calendar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Cormorant+Garamond:wght@500;600;700&family=UnifrakturMaguntia&family=VT323&display=swap" rel="stylesheet">
<style>
  :root{
    --void:          #0b0614;
    --deep-violet:   #1c0a30;
    --mid-violet:    #33144e;
    --blood-magenta: #7a1a6b;
    --eerie-purple:  #8661bb;
    --eerie-red:     #ff3d6e;
    --moon-sick:     #cdb9de;
    --text-parch:    #e9dcf5;
    --text-dim:      #9d84b8;
  }

  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; background:#0b0614; }

  body{
    font-family:'Cormorant Garamond', serif;
    display:flex; align-items:flex-start; justify-content:center;
  }

  .widget{
    position:relative;
    width:100%;
    border-radius:14px;
    overflow:hidden;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(178,59,255,0.10), transparent 55%),
      linear-gradient(180deg, var(--void) 0%, var(--deep-violet) 45%, #150826 100%);
    box-shadow:
      0 30px 70px -20px rgba(0,0,0,0.85),
      0 0 0 1px rgba(178,59,255,0.18) inset,
      0 0 40px rgba(122,26,107,0.25);
    color:var(--text-parch);
  }

  .widget::before, .widget::after{
    content:"";
    position:absolute;
    width:9px; height:9px;
    border:1px solid rgba(178,59,255,0.5);
    transform:rotate(45deg);
    z-index:5;
  }
  .widget::before{ top:10px; left:10px; }
  .widget::after{ top:10px; right:10px; }
  .corner-bl, .corner-br{
    content:"";
    position:absolute;
    width:9px; height:9px;
    border:1px solid rgba(178,59,255,0.5);
    transform:rotate(45deg);
    z-index:5;
  }
  .corner-bl{ bottom:10px; left:10px; }
  .corner-br{ bottom:10px; right:10px; }

  /* ---------- VHS / camcorder overlay ---------- */
  .vhs-tint{
    position:absolute; inset:0;
    background:rgba(150,90,210,0.16);
    mix-blend-mode:color;
    z-index:20;
    pointer-events:none;
  }
  .vhs-grain{
    position:absolute; inset:-20%;
    width:140%; height:140%;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    opacity:0.10;
    mix-blend-mode:overlay;
    z-index:21;
    pointer-events:none;
    animation:grain-shift 0.5s steps(3) infinite;
  }
  @keyframes grain-shift{
    0%{ transform:translate(0,0); }
    33%{ transform:translate(-2%,1%); }
    66%{ transform:translate(1%,-2%); }
    100%{ transform:translate(0,0); }
  }
  .vhs-scanlines{
    position:absolute; inset:0;
    background:repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0) 0px,
      rgba(0,0,0,0.16) 1px,
      rgba(0,0,0,0) 2px,
      rgba(0,0,0,0) 3px
    );
    z-index:22;
    pointer-events:none;
  }
  .vhs-tracking{
    position:absolute;
    left:0; width:100%; height:10px;
    background:linear-gradient(180deg, transparent, rgba(232,222,245,0.10), transparent);
    z-index:23;
    pointer-events:none;
    animation:tracking-sweep 7s linear infinite;
  }
  @keyframes tracking-sweep{
    0%{ top:-10px; }
    100%{ top:100%; }
  }
  .vhs-vignette{
    position:absolute; inset:0;
    box-shadow: inset 0 0 60px 18px rgba(0,0,0,0.55);
    z-index:19;
    pointer-events:none;
  }

  .vhs-ui{
    font-family:'VT323', monospace;
    color:rgba(232,222,245,0.88);
    text-shadow:0 0 4px rgba(180,120,230,0.7);
    z-index:24;
    pointer-events:none;
  }
  .vhs-play{
    position:absolute; top:12px; left:14px;
    font-size:15px; letter-spacing:2px;
    display:flex; align-items:center; gap:5px;
  }
  .vhs-play::before{ content:"▶"; font-size:10px; }
  .vhs-timecode{
    position:absolute; top:12px; right:14px;
    font-size:15px; letter-spacing:2px;
    display:flex; align-items:center; gap:5px;
    animation:tc-blink 1.3s steps(1) infinite;
  }
  .vhs-timecode .dot{
    width:6px; height:6px; border-radius:50%;
    background:#ff3d6e;
    box-shadow:0 0 6px 2px rgba(255,61,110,0.75);
  }
  @keyframes tc-blink{ 50%{ opacity:0.3; } }
  .vhs-stamp{
    position:absolute; bottom:8px; left:14px;
    font-size:14px; line-height:1.2;
    letter-spacing:1px;
  }

  /* ---------- sky ---------- */
  .sky{
    position:relative;
    height:88px;
    overflow:hidden;
    clip-path: polygon(0 0, 100% 0, 100% 82%, 50% 100%, 0 82%);
  }

  .stars{
    position:absolute; inset:0;
    background-image:
      radial-gradient(1.4px 1.4px at 24px 26px, #e9dcf5, transparent),
      radial-gradient(1px 1px at 64px 66px, #e9dcf5, transparent),
      radial-gradient(1.4px 1.4px at 104px 18px, #e9dcf5, transparent),
      radial-gradient(1px 1px at 150px 50px, #e9dcf5, transparent),
      radial-gradient(1.4px 1.4px at 190px 12px, #e9dcf5, transparent),
      radial-gradient(1px 1px at 230px 38px, #e9dcf5, transparent),
      radial-gradient(1.4px 1.4px at 270px 60px, #e9dcf5, transparent),
      radial-gradient(1px 1px at 310px 22px, #e9dcf5, transparent),
      radial-gradient(1.4px 1.4px at 340px 46px, #e9dcf5, transparent),
      radial-gradient(1px 1px at 46px 86px, #e9dcf5, transparent);
    opacity:0.5;
    animation: twinkle 5s ease-in-out infinite alternate;
  }
  @keyframes twinkle{ from{opacity:0.3;} to{opacity:0.7;} }

  .moon{
    position:absolute;
    top:9px; left:50%;
    transform:translateX(-50%);
    width:28px; height:28px;
    border-radius:50%;
    background:radial-gradient(circle at 38% 32%, #e8dcef 0%, var(--moon-sick) 45%, #7a5f92 100%);
    box-shadow:
      0 0 22px 6px rgba(255,61,110,0.35),
      0 0 46px 14px rgba(178,59,255,0.30);
    animation: eerie-pulse 3.2s ease-in-out infinite;
  }
  @keyframes eerie-pulse{
    0%,100%{ box-shadow:0 0 22px 6px rgba(255,61,110,0.30), 0 0 46px 14px rgba(178,59,255,0.25); }
    50%{ box-shadow:0 0 30px 10px rgba(255,61,110,0.55), 0 0 60px 20px rgba(178,59,255,0.45); }
  }
  .moon::before{
    content:"";
    position:absolute;
    top:32%; left:22%;
    width:5px; height:5px;
    border-radius:50%;
    background:rgba(60,20,50,0.35);
  }
  .moon::after{
    content:"";
    position:absolute;
    top:55%; left:55%;
    width:7px; height:7px;
    border-radius:50%;
    background:rgba(60,20,50,0.28);
  }

  /* bats */
  .bat{
    position:absolute;
    top:40px;
    width:11px; height:5px;
    opacity:0.85;
  }
  .bat::before, .bat::after{
    content:"";
    position:absolute;
    top:0;
    width:8px; height:8px;
    background:var(--void);
    border-radius:60% 60% 10% 10%;
  }
  .bat::before{ left:-4px; transform-origin:right center; animation:flapL 0.5s ease-in-out infinite; }
  .bat::after{ right:-4px; transform-origin:left center; animation:flapR 0.5s ease-in-out infinite; }
  @keyframes flapL{ 0%,100%{ transform:rotate(15deg) scaleY(1);} 50%{ transform:rotate(60deg) scaleY(0.55);} }
  @keyframes flapR{ 0%,100%{ transform:rotate(-15deg) scaleY(1);} 50%{ transform:rotate(-60deg) scaleY(0.55);} }

  .bat1{ animation: fly1 9s linear infinite; }
  .bat2{ animation: fly2 12s linear infinite; animation-delay:2.5s; }
  .bat3{ animation: fly3 10.5s linear infinite; animation-delay:5s; }

  @keyframes fly1{
    0%{ left:-20px; top:55px; }
    50%{ top:38px; }
    100%{ left:400px; top:61px; }
  }
  @keyframes fly2{
    0%{ left:400px; top:20px; }
    50%{ top:35px; }
    100%{ left:-20px; top:16px; }
  }
  @keyframes fly3{
    0%{ left:-20px; top:72px; }
    50%{ top:55px; }
    100%{ left:400px; top:75px; }
  }

  .hill-back, .hill-front{
    position:absolute; bottom:0; left:0; width:100%;
  }
  .hill-back{
    height:33px;
    background:var(--mid-violet);
    opacity:0.6;
    clip-path: polygon(0% 100%, 0% 55%, 12% 40%, 28% 55%, 45% 35%, 60% 58%, 78% 42%, 100% 60%, 100% 100%);
  }
  .hill-front{
    height:20px;
    background:#170a28;
    clip-path: polygon(0% 100%, 0% 70%, 15% 50%, 35% 68%, 55% 48%, 75% 66%, 100% 45%, 100% 100%);
  }

  /* raven perched on hill spike */
  .raven{
    position:absolute;
    bottom:18px; left:66%;
    width:12px; height:8px;
  }
  .raven::before{
    content:"";
    position:absolute;
    width:12px; height:8px;
    background:var(--void);
    border-radius:50% 50% 40% 40%;
  }
  .raven::after{
    content:"";
    position:absolute;
    top:-2px; left:9px;
    width:0; height:0;
    border-left:5px solid var(--void);
    border-top:2px solid transparent;
    border-bottom:2px solid transparent;
  }

  .sky-fade{
    position:absolute; left:0; right:0; bottom:0; height:28px;
    background:linear-gradient(180deg, rgba(28,10,48,0) 0%, var(--deep-violet) 100%);
  }

  /* ---------- header ---------- */
  .header{ position:relative; text-align:center; padding:6px 0 6px; }
  .month{
    font-family:'UnifrakturMaguntia', cursive;
    font-size:26px;
    color:var(--text-parch);
    text-shadow:
      -1.5px 0 rgba(255,60,180,0.55),
      1.5px 0 rgba(80,220,255,0.45),
      0 0 16px rgba(178,59,255,0.65),
      0 0 30px rgba(255,61,110,0.25);
    margin:0;
    letter-spacing:1px;
  }
  .year{
    font-family:'Cinzel', serif;
    font-size:10px;
    letter-spacing:4px;
    color:var(--text-dim);
    margin-top:3px;
  }
  .divider{
    width:110px; height:1px;
    margin:7px auto 0;
    background:linear-gradient(90deg, transparent, var(--eerie-purple), transparent);
    position:relative;
  }
  .divider::before{
    content:"✦";
    position:absolute; top:50%; left:50%;
    transform:translate(-50%,-50%);
    font-size:9px;
    color:var(--eerie-red);
    background:var(--deep-violet);
    padding:0 4px;
  }

  /* ---------- calendar ---------- */
  .cal{ position:relative; padding:8px 18px 10px; }
  .dow{ display:grid; grid-template-columns:repeat(7,1fr); margin-bottom:5px; }
  .dow span{
    text-align:center;
    font-family:'Cinzel', serif;
    font-size:10.5px;
    font-weight:600;
    letter-spacing:1px;
    color:var(--eerie-purple);
    opacity:0.8;
  }
  .dow span.weekend-label{ color:var(--eerie-red); opacity:0.85; }
  .grid{ display:grid; grid-template-columns:repeat(7,1fr); row-gap:4px; }
  .day{
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    aspect-ratio:1 / 1;
    font-size:14px;
    font-weight:600;
    color:var(--text-parch);
    border-radius:4px;
  }
  .day.empty{ visibility:hidden; }
  .day.weekend{ color:var(--eerie-red); }
  .day.today{
    background:linear-gradient(180deg, rgba(178,59,255,0.32), rgba(255,61,110,0.10));
    box-shadow:0 0 14px rgba(178,59,255,0.55);
  }
  .day.today::after{
    content:"";
    position:absolute; bottom:1px; left:50%;
    transform:translateX(-50%);
    width:3px; height:3px;
    border-radius:50%;
    background:var(--eerie-red);
    box-shadow:0 0 7px 2px var(--eerie-red);
  }

  /* ---------- altar / sword ---------- */
  .altar{
    position:relative; height:34px;
    margin:0;
    display:flex; align-items:flex-end; justify-content:center;
  }
  .beam{
    position:absolute; bottom:0;
    width:32px; height:34px;
    background:linear-gradient(180deg, rgba(178,59,255,0.38), rgba(255,61,110,0.12) 60%, transparent 90%);
    clip-path:polygon(50% 0%, 100% 100%, 0% 100%);
    filter:blur(2px);
  }
  .sword{ position:relative; display:flex; flex-direction:column; align-items:center; }
  .pommel{ width:4px; height:4px; background:var(--text-parch); border-radius:1px; box-shadow:0 0 8px 2px var(--eerie-purple); }
  .grip{ width:3px; height:5px; background:#241033; }
  .guard{
    width:18px; height:3px;
    background:linear-gradient(90deg, transparent, var(--eerie-purple) 20%, var(--text-parch) 50%, var(--eerie-red) 80%, transparent);
    box-shadow:0 0 10px rgba(178,59,255,0.7);
  }
  .blade{
    width:3px; height:18px;
    background:linear-gradient(180deg, var(--text-parch), var(--eerie-purple) 55%, rgba(255,61,110,0.25));
    box-shadow:0 0 12px 2px rgba(255,61,110,0.5);
  }

  .footer-note{
    text-align:center;
    font-family:'Cinzel', serif;
    font-size:10px;
    letter-spacing:2px;
    color:var(--text-dim);
    padding:0 20px 12px;
    opacity:0.75;
  }
</style>
</head>
<body>

  <div class="widget">
    <div class="corner-bl"></div>
    <div class="corner-br"></div>

    <div class="vhs-vignette"></div>
    <div class="vhs-tint"></div>
    <div class="vhs-grain"></div>
    <div class="vhs-scanlines"></div>
    <div class="vhs-tracking"></div>
    <div class="vhs-ui">
      <div class="vhs-play">PLAY</div>
      <div class="vhs-timecode"><span class="dot"></span>REC</div>
      <div class="vhs-stamp" id="vhsStamp">--:--<br>--- -- ----</div>
    </div>

    <div class="sky">
      <div class="stars"></div>
      <div class="moon"></div>
      <div class="bat bat1"></div>
      <div class="bat bat2"></div>
      <div class="bat bat3"></div>
      <div class="hill-back"></div>
      <div class="raven"></div>
      <div class="hill-front"></div>
      <div class="sky-fade"></div>
    </div>

    <div class="header">
      <p class="month">July</p>
      <div class="year">2 0 2 6</div>
      <div class="divider"></div>
    </div>

    <div class="cal">
      <div class="dow">
        <span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span class="weekend-label">F</span><span class="weekend-label">S</span>
      </div>
      <div class="grid" id="grid"></div>
    </div>

    <div class="altar">
      <div class="beam"></div>
      <div class="sword">
        <div class="pommel"></div>
        <div class="grip"></div>
        <div class="guard"></div>
        <div class="blade"></div>
      </div>
    </div>

    <div class="footer-note">the hollow hours keep watch</div>
  </div>

<script>
  // Auto-detects the real current date — no manual editing needed.
  const now = new Date();
  const year = now.getFullYear();
  const monthIndex = now.getMonth(); // 0 = Jan ... 11 = Dec
  const today = now.getDate();

  // VHS timestamp burn-in (updates live, like a camcorder overlay)
  const monthAbbr = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
  function pad2(n){ return n < 10 ? "0"+n : n; }
  function updateStamp(){
    const t = new Date();
    const hh = pad2(t.getHours());
    const mm = pad2(t.getMinutes());
    const stamp = document.getElementById('vhsStamp');
    if(stamp){
      stamp.innerHTML = hh + ":" + mm + "<br>" + monthAbbr[t.getMonth()] + ". " + t.getDate() + " " + t.getFullYear();
    }
  }
  updateStamp();
  setInterval(updateStamp, 1000);

  const firstOfMonth = new Date(year, monthIndex, 1);
  const firstDayCol = firstOfMonth.getDay(); // 0 = Sun ... 6 = Sat
  const daysInMonth = new Date(year, monthIndex + 1, 0).getDate();

  const monthNames = ["January","February","March","April","May","June",
                       "July","August","September","October","November","December"];
  document.querySelector('.month').textContent = monthNames[monthIndex];
  document.querySelector('.year').textContent = String(year).split('').join(' ');

  const grid = document.getElementById('grid');

  for(let i=0;i<firstDayCol;i++){
    const empty = document.createElement('div');
    empty.className='day empty';
    grid.appendChild(empty);
  }
  for(let d=1; d<=daysInMonth; d++){
    const col = (firstDayCol + d - 1) % 7;
    const cell = document.createElement('div');
    cell.className = 'day' + (col===5||col===6 ? ' weekend' : '') + (d===today ? ' today' : '');
    cell.textContent = d;
    grid.appendChild(cell);
  }
</script>

</body>
</html>
